<div class="sidebar shadow d-flex flex-column justify-content-between">
  <div>
    <div class="logo-section p-4">
      <h3 class="text-primary fw-bold">ConfigSync</h3>
    </div>

    <ul class="nav flex-column">
      <!-- <small class="text-uppercase text-muted fw-bold px-4 mb-2">Main Menu</small> -->
      <li class="nav-item">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
          <span class="icon bg-primary-light text-primary"><i class="bi bi-tv"></i></span>
          Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/compare" routerLinkActive="active" class="nav-link">
          <span class="icon bg-info-light text-info"><i class="bi bi-intersect"></i></span>
          Comparison
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/export" routerLinkActive="active" class="nav-link">
          <span class="icon bg-danger-light text-danger"><i class="bi bi-cloud-download"></i></span>
          Export
        </a>
      </li>
    </ul>
  </div>

  <div class="sidebar-footer p-3 border-top">
    <div class="user-info mb-3 px-2">
      <div class="d-flex align-items-center">
        <div class="avatar-sm bg-secondary text-white rounded-circle p-2 me-2">
            <i class="bi bi-person"></i>
        </div>
        <div>
          <h6 class="mb-0 text-dark">{{ userName }}</h6>
          <small class="text-muted">{{ userRole }}</small>
        </div>
      </div>
    </div>
    
    <button (click)="onLogout()" class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center">
      <i class="bi bi-box-arrow-left me-2"></i>
      Déconnexion
    </button>
  </div>
</div>
